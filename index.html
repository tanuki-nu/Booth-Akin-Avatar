<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAA System</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --accent-color: #ff6b6b;
            --text-color: #333;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 90%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Start Screen */
        #start-screen p {
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* Question Screen */
        .progress {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 2rem;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 12px;
            border: 2px solid var(--primary-color);
            background-color: white;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Result Screen */
        .result-card {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 10px;
            background-color: #fafafa;
        }

        .result-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .result-score {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .booth-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .booth-link:hover {
            opacity: 0.8;
        }

        .retry-btn {
            margin-top: 2rem;
            background: none;
            border: none;
            color: var(--primary-color);
            text-decoration: underline;
            cursor: pointer;
        }

        /* Loading */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Debug Info (hidden) */
        #debug-info {
            display: none;
        }

        @media (max-width: 480px) {
            #app {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.2rem;
            }
            .question-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
</div>

<div id="app">
    <h1>20の質問で好みを推測</h1>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <p>20個の質問に答えると、あなたの好みにぴったりのアイテムを推測します。</p>
        <button class="option-btn" onclick="startQuiz()" style="width: 100%; background-color: var(--primary-color); color: white;">診断を始める</button>
    </div>

    <!-- Question Screen -->
    <div id="question-screen" class="screen">
        <div class="progress" id="progress-text">1 / 20</div>
        <div class="question-text" id="question-text">質問内容がここに表示されます</div>
        <div class="options">
            <button class="option-btn" onclick="handleAnswer(1.0)">そう</button>
            <button class="option-btn" onclick="handleAnswer(0.5)">部分的にそう</button>
            <button class="option-btn" onclick="handleAnswer(0)">わからない</button>
            <button class="option-btn" onclick="handleAnswer(-0.5)">部分的にいいえ</button>
            <button class="option-btn" onclick="handleAnswer(-1.0)">いいえ</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <h2>あなたの好みはこれかも？</h2>
        <div class="result-card" id="result-content">
            <!-- 結果がここに挿入されます -->
        </div>
        <button class="retry-btn" onclick="resetQuiz()">もう一度診断する</button>
    </div>
</div>

<!-- Hidden Debug Info -->
<div id="debug-info">
    <div id="debug-user-pref"></div>
    <div id="debug-current-best"></div>
    <div id="debug-csv-status"></div>
    <div id="debug-vector-dim"></div>
</div>

<script>
    const CSV_FILE = "dataset/dataset_2026_5.csv";
    const QUESTIONS = [
        "明るくパステル調の色合いが好きですか？",
        "暗めでモノトーン寄りの色合いが好きですか？",
        "鮮やかでコントラストの強い色使いが好きですか？",
        "ワントーンで落ち着いた配色が好きですか？",
        "大きく強調された目がある見た目が好きですか？",
        "控えめで小さめの目の見た目が好きですか？",
        "リアル寄りの顔立ち（肌質や陰影が詳細）が好きですか？",
        "アニメ・デフォルメ寄りの顔立ちが好きですか？",
        "髪色が自然色（黒・茶・金など）が好みですか？",
        "髪色が派手な非現実色（青・ピンク・緑など）が好みですか？",
        "髪型が複雑・装飾的（編み込み・ツインテ等）が好きですか？",
        "髪型がシンプルでナチュラルな方が好きですか？",
        "肌の色味が人間らしい自然色の方が好きですか？",
        "肌や体に非人間的な色（青・灰・緑等）がある方が好きですか？",
        "動物的パーツ（耳・しっぽ等）がある見た目が好きですか？",
        "ファンタジー要素（角・羽など）がある見た目が好きですか？",
        "メタリックやサイバーな質感・光るパーツがある見た目が好きですか？",
        "衣装やアクセサリが派手で目立つ方が好きですか？",
        "最小限の装飾でミニマルな外見が好きですか？",
        "中性的・ジェンダー曖昧な見た目が好みですか？"
    ];

    let items = [];
    let currentQuestionIndex = 0;
    let userPref = [];
    let questionVectors = [];
    let vectorDim = 0;
    let currentBestMatch = null;

    // 初期化
    async function init() {
        try {
            await loadCSV();
            updateDebugInfo();
            document.getElementById('loading-overlay').style.display = 'none';
        } catch (error) {
            console.error("CSVの読み込みに失敗しました:", error);
            updateDebugInfo(`CSV読み込みエラー: ${error.message}`);
            alert("データの読み込みに失敗しました。dataset内にデータセットが存在するか確認してください。");
        }
    }

    // CSV読み込みとパース
    async function loadCSV() {
        const response = await fetch(CSV_FILE);
        if (!response.ok) {
            throw new Error(`HTTP Error: ${response.status}`);
        }
        const text = await response.text();
        
        const lines = text.split(/\r?\n/);
        items = [];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            // 簡易CSVパース（カンマ区切り、ただしJSON配列内のカンマに注意が必要）
            const parts = parseCSVLine(line);
            if (parts.length < 5) {
                console.warn(`行 ${i} のカラム数が不足しています:`, parts.length);
                continue;
            }

            try {
                const vectorStr = parts[1].trim();
                const parsedVector = JSON.parse(vectorStr);
                
                if (!Array.isArray(parsedVector)) {
                    throw new Error("ベクトルは配列である必要があります");
                }

                const item = {
                    id: parts[0].trim(),
                    vector: parsedVector,
                    url: parts[2].trim(),
                    title: parts[3].trim(),
                    icon_url: parts[4].trim()
                };
                items.push(item);
                
                // ベクトルの次元数を取得
                if (vectorDim === 0) {
                    vectorDim = item.vector.length;
                    console.log(`ベクトル次元数: ${vectorDim}`);
                    generateQuestionVectors(vectorDim);
                    userPref = new Array(vectorDim).fill(0);
                }
            } catch (e) {
                console.warn(`行 ${i} のパースに失敗しました:`, line, e);
            }
        }

        console.log(`読み込み完了: ${items.length} アイテム`);
        if (items.length === 0) {
            throw new Error("CSVからアイテムを読み込めませんでした");
        }
    }

    // CSVの1行をパースする（カンマ区切り、引用符や配列を考慮）
    function parseCSVLine(line) {
        const result = [];
        let cur = "";
        let inArray = false;
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '[') inArray = true;
            if (char === ']') inArray = false;
            if (char === '"') inQuotes = !inQuotes;

            if (char === ',' && !inArray && !inQuotes) {
                result.push(cur);
                cur = "";
            } else {
                cur += char;
            }
        }
        result.push(cur);
        return result;
    }

    // 質問ごとの特徴ベクトルを生成
    function generateQuestionVectors(dim) {
        questionVectors = [];
        for (let i = 0; i < QUESTIONS.length; i++) {
            let v = new Array(dim).fill(0);
            v[i % dim] = 1.0; 
            
            // 少し複雑にするため、隣接する次元にも少し影響を与える
            if (dim > 1) {
                v[(i + 1) % dim] = 0.2;
                if (i > 0) {
                    v[(i - 1) % dim] = 0.2;
                }
            }
            
            questionVectors.push(v);
        }
    }

    // 診断開始
    function startQuiz() {
        currentQuestionIndex = 0;
        userPref = new Array(vectorDim).fill(0);
        currentBestMatch = null;
        showScreen('question-screen');
        updateQuestion();
    }

    // 質問表示更新
    function updateQuestion() {
        document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${QUESTIONS.length}`;
        document.getElementById('question-text').innerText = QUESTIONS[currentQuestionIndex];
    }

    // 回答処理
    function handleAnswer(weight) {
        const qVec = questionVectors[currentQuestionIndex];
        
        // 嗜好ベクトルを更新: user_pref += qVec * weight
        for (let i = 0; i < vectorDim; i++) {
            userPref[i] += qVec[i] * weight;
        }

        // 現在のベストマッチを更新
        updateCurrentBestMatch();
        updateDebugInfo();

        currentQuestionIndex++;

        if (currentQuestionIndex < QUESTIONS.length) {
            updateQuestion();
        } else {
            showResult();
        }
    }

    // コサイン類似度の計算
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0;
        let normA = 0;
        let normB = 0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    // 現在のベストマッチを更新
    function updateCurrentBestMatch() {
        let bestMatch = null;
        let maxSim = -Infinity;

        items.forEach(item => {
            const sim = cosineSimilarity(userPref, item.vector);
            if (sim > maxSim) {
                maxSim = sim;
                bestMatch = item;
            }
        });

        currentBestMatch = {
            item: bestMatch,
            similarity: maxSim
        };
    }

    // 結果表示
    function showResult() {
        const resultContent = document.getElementById('result-content');
        
        if (currentBestMatch && currentBestMatch.item) {
            const item = currentBestMatch.item;
            resultContent.innerHTML = `
                <img src="${item.icon_url}" alt="${item.title}" class="result-image" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                <div class="result-title">${item.title}</div>
                <div class="result-score">類似度スコア: ${currentBestMatch.similarity.toFixed(3)}</div>
                <a href="${item.url}" target="_blank" class="booth-link">Boothで見る</a>
            `;
        } else {
            resultContent.innerHTML = "<p>申し訳ございません。推測に失敗しました。もう一度お試しください。</p>";
        }

        updateDebugInfo();
        showScreen('result-screen');
    }

    // 画面切り替え
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // リセット
    function resetQuiz() {
        showScreen('start-screen');
    }

    // デバッグ情報を更新（内部保持、表示なし）
    function updateDebugInfo(errorMsg = null) {
        const debugInfo = {
            timestamp: new Date().toISOString(),
            csvStatus: `読み込み完了: ${items.length} アイテム`,
            vectorDim: vectorDim,
            userPref: userPref.slice(),
            currentQuestion: currentQuestionIndex,
            currentBestMatch: currentBestMatch ? {
                id: currentBestMatch.item.id,
                title: currentBestMatch.item.title,
                similarity: currentBestMatch.similarity.toFixed(3),
                url: currentBestMatch.item.url
            } : null,
            errorMsg: errorMsg
        };

        // HTMLの隠し要素に情報を保持
        document.getElementById('debug-user-pref').textContent = JSON.stringify(debugInfo.userPref);
        document.getElementById('debug-current-best').textContent = JSON.stringify(debugInfo.currentBestMatch);
        document.getElementById('debug-csv-status').textContent = debugInfo.csvStatus;
        document.getElementById('debug-vector-dim').textContent = debugInfo.vectorDim;

        // コンソールにも出力
        console.log('Debug Info:', debugInfo);
    }

    // 実行
    init();
</script>

</body>
</html>
